:root {
  --bg: #f7f5ef;
  --surface: #ffffff;

  --soft: #fbfaf7;
  --accent: #28705a;
  --accent-soft: #dfece6;
  --warn: #9a6a18;

* {

}

[hidden] {

}

body {

button {

.topbar {

  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 18px;
}

.eyebrow,
.meta-line {
  color: var(--muted);
}

.eyebrow {
  font-size: 14px;
  margin-bottom: 8px;
}

h1,
h2,
h3 {
  margin: 0;
}

h1 {
  font-size: 42px;
  line-height: 1.1;
}

h2 {
  font-size: 20px;
  line-height: 1.3;
  margin-bottom: 14px;
}

h3 {
  font-size: 14px;
  line-height: 1.3;
}

.meta-line {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 2px 8px;
  border-radius: 6px;
  color: var(--warn);
  background: var(--warn-soft);
  font-size: 13px;
}

.tool-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 42px;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  color: var(--ink);
  cursor: pointer;
}

.tool-button:hover {
  border-color: #b8af9d;
}

.date-strip-panel,
.chart-dashboard,
.index-strength-panel,
.secondary-chart-panel,
.table-section,
.tables-block,
.source-panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.index-strength-panel,
.secondary-chart-panel {
  padding: 18px;
  margin-bottom: 16px;
}

.secondary-chart-panel {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(360px, 0.72fr);
  gap: 16px;
}

.secondary-chart-block {
  min-width: 0;
}

.chart-dashboard {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(380px, 0.65fr);
  gap: 16px;
  padding: 18px;
  margin-bottom: 16px;
}

.section-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}

.section-title-row h2 {
  margin-bottom: 0;
}

.section-title-row span {
  color: var(--muted);
  font-size: 13px;
}

.chart-left,
.chart-right {
  min-width: 0;
}

.chart-right {
  display: grid;
  align-content: start;
  gap: 16px;
}

.right-chart-block {
  min-width: 0;
}

.chart-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.chart-grid-compact {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

#componentHighCharts {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.chart-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 12px;

  overflow: hidden;
}

.chart-card-large {
  height: 100%;
}

.chart-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}

.chart-head h3 {
  color: var(--muted);
  font-weight: 600;
}

.chart-head strong {
  font-size: 14px;
  line-height: 1.35;
  text-align: right;
  max-width: 72%;
}

.chart-deltas {

  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
  margin: 0 0 8px;
}

.chart-deltas div {

  justify-content: space-between;

.chart-deltas span {

.chart-deltas strong {

.delta-value.positive {

}

.delta-value.negative {
  color: #28705a;
}

.delta-value.neutral {
  color: var(--muted);
}

.chart-body {
  min-height: 150px;
  min-width: 0;
  overflow: hidden;
}

.chart-card-large .chart-body {
  min-height: 250px;
}

.chart-body svg {
  display: block;
  width: 100%;
  height: auto;
}

.grid-line {

}

.zero-line {

  stroke-width: 1.2;

  align-items: center;
  gap: 5px;
}

.chart-legend i {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

.empty-chart {

  min-height: 150px;
  place-items: center;
  color: var(--muted);

  border-radius: 8px;

.date-strip-panel {

}

.index-strength-strip {

  overflow-x: auto;
  padding-bottom: 2px;
}

.strength-card {

.strength-card strong {

.date-pill strong {

.date-pill span {

.tables {

.tables-block {

.table-section {

  max-width: 100%;
}

.time-table {

  border-collapse: separate;
  border-spacing: 0;
  font-size: 14px;
}

.time-table th,
.time-table td {

  max-width: 240px;

  border-right: 1px solid var(--line);

  text-align: left;
  background: #fff;
}

.time-table thead th {

}

.time-table .field-head,
.time-table .field-name {

.empty-value {

.sources table {

  font-size: 14px;
}

.sources th,

  text-align: left;

.sources th {

    { key: "中证1000加权基差", label: "中证1000", color: "#a66a18" }
  ]
};

const componentHighChartSpecs = [
  {
    title: "沪深300新高占比",
    series: [{ key: "沪深三百20日新高占比", label: "沪深300", color: "#315f8c" }]
  },
  {
    title: "中证500新高占比",
    series: [{ key: "中证五百20日新高占比", label: "中证500", color: "#28705a" }]
  },
  {
    title: "中证2000新高占比",
    series: [{ key: "中证两千20日新高占比", label: "中证2000", color: "#a66a18" }]
  }
];

const topicRotationChartSpecs = [
  {
    title: "题材轮动速度",
    series: [{ key: "题材轮动速度", label: "速度", color: "#8a5a9e" }]
  },
  {
    title: "题材轮动数量",
    series: [{ key: "题材轮动数量", label: "数量", color: "#a66a18" }]
  }
];

function el(id) {
  return document.getElementById(id);
}

function isEmpty(value) {
  return value === null || value === undefined || value === "";
}

function shortDate(dateText) {
  if (!dateText) return "--";
  const text = String(dateText);
  const match = text.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (match) return `${match[2]}-${match[3]}`;
  return text.replaceAll(".", "-");
}

function valueLines(value) {
  if (isEmpty(value)) return ["空"];
  if (!Array.isArray(value)) return [String(value)];
  if (!value.length) return ["空"];
  if (value.every((item) => Array.isArray(item))) {
    return value.map((row) => row.map((cell) => isEmpty(cell) ? "空" : String(cell)).join("  "));
  }
  return value.map((item) => isEmpty(item) ? "空" : String(item));
}

function parseNumber(value) {
  if (isEmpty(value)) return null;
  if (typeof value === "number") return value;
  const match = String(value).replaceAll(",", "").replace("%", "").match(/-?\d+(\.\d+)?/);
  return match ? Number(match[0]) : null;
}

function upRatioValue(values) {
  const red = parseNumber(values?.["红盘"]);
  const green = parseNumber(values?.["绿盘"]);
  const flat = parseNumber(values?.["平盘"]);
  if (![red, green, flat].every((value) => value !== null && Number.isFinite(value))) return null;
  const total = red + green + flat;
  return total > 0 ? red / total * 100 : null;
}

function reviewValue(review, key) {
  if (key === upRatioKey) return upRatioValue(review.values || {});
  return review.values?.[key];
}

function latestValue(reviews, key) {
  for (const review of reviews) {
    const value = reviewValue(review, key);
    if (!isEmpty(value)) return value;
  }
  return "";
}

function formatLatestValue(value, key = "") {
  if (key === upRatioKey && typeof value === "number" && Number.isFinite(value)) return `${value.toFixed(2)}%`;
  if (Array.isArray(value)) return valueLines(value).slice(0, 2).join(" / ");
  return isEmpty(value) ? "空" : String(value);
}

function formatAmountDelta(value) {
  if (value === null || !Number.isFinite(value)) return "空";
  const rounded = Math.round(value);
  if (rounded === 0) return "0亿";
  return `${rounded > 0 ? "+" : "-"}${Math.abs(rounded)}亿`;
}

function signedClass(value) {
  if (value > 0) return "positive";
  if (value < 0) return "negative";
  return "neutral";
}

function numericSeries(reviews, key) {
  return reviews
    .map((review) => parseNumber(review.values?.[key]))
    .filter((value) => value !== null && Number.isFinite(value));
}

function createAmountDeltaStrip(reviews, key) {
  const values = numericSeries(reviews, key);
  const latest = values[0];
  const previous = values[1];
  const fiveDayValues = values.slice(0, 5);
  const fiveDayAverage = fiveDayValues.length === 5
    ? fiveDayValues.reduce((sum, value) => sum + value, 0) / fiveDayValues.length
    : null;
  const items = [
    ["较昨日", latest !== undefined && previous !== undefined ? latest - previous : null],
    ["较5日均", latest !== undefined && fiveDayAverage !== null ? latest - fiveDayAverage : null]
  ];
  const strip = document.createElement("div");
  strip.className = "chart-deltas";
  items.forEach(([labelText, value]) => {
    const item = document.createElement("div");
    const label = document.createElement("span");
    const strong = document.createElement("strong");
    label.textContent = labelText;
    strong.textContent = formatAmountDelta(value);
    strong.className = `delta-value ${signedClass(value)}`;
    item.append(label, strong);
    strip.append(item);
  });
  return strip;
}

function firstPair(value) {
  if (Array.isArray(value) && Array.isArray(value[0])) return value[0];
  if (Array.isArray(value)) return value;
  return [value, ""];
}

function svgEl(name, attrs = {}) {
  const node = document.createElementNS("http://www.w3.org/2000/svg", name);
  Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, String(value)));
  return node;
}

function pathFromPoints(points) {
  return points.map((point, index) => `${index === 0 ? "M" : "L"}${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(" ");
}

function renderLineChart(spec, reviews, options = {}) {
  const chronological = [...reviews].reverse();
  const width = options.width || 360;
  const height = options.height || 170;
  const pad = { left: 32, right: 60, top: 14, bottom: 28 };
  const valuesBySeries = spec.series.map((series) => ({
    ...series,
    values: chronological.map((review) => parseNumber(reviewValue(review, series.key)))
  }));
  const allValues = valuesBySeries.flatMap((series) => series.values.filter((value) => value !== null && Number.isFinite(value)));
  const container = document.createElement("div");
  container.className = "chart-body";
  if (!allValues.length) {
    container.innerHTML = "<div class=\"empty-chart\">无数据</div>";
    return container;
  }

  let min = spec.compactScale ? Math.min(...allValues) : Math.min(...allValues, 0);
  let max = spec.compactScale ? Math.max(...allValues) : Math.max(...allValues, 0);
  if (min === max) {
    min -= 1;
    max += 1;
  }
  const yPad = (max - min) * 0.08;
  min -= yPad;
  max += yPad;
  const xStep = chronological.length > 1 ? (width - pad.left - pad.right) / (chronological.length - 1) : 0;
  const yScale = (value) => pad.top + (max - value) / (max - min) * (height - pad.top - pad.bottom);
  const xScale = (index) => pad.left + index * xStep;

  const svg = svgEl("svg", { viewBox: `0 0 ${width} ${height}`, role: "img", "aria-label": spec.title });
  [0.25, 0.5, 0.75].forEach((ratio) => {
    const y = pad.top + ratio * (height - pad.top - pad.bottom);
    svg.append(svgEl("line", { x1: pad.left, y1: y, x2: width - pad.right, y2: y, class: "grid-line" }));
  });
  if (min < 0 && max > 0) {
    const zeroY = yScale(0);
    svg.append(svgEl("line", { x1: pad.left, y1: zeroY, x2: width - pad.right, y2: zeroY, class: "zero-line" }));
  }

  valuesBySeries.forEach((series) => {
    const points = series.values
      .map((value, index) => value === null || !Number.isFinite(value) ? null : { x: xScale(index), y: yScale(value) })
      .filter(Boolean);
    if (!points.length) return;
    if (points.length >= 2) {
      svg.append(svgEl("path", {
        d: pathFromPoints(points),
        fill: "none",
        stroke: series.color,
        "stroke-width": 2.4,
        "stroke-linecap": "round",
        "stroke-linejoin": "round"
      }));
    }
    points.forEach((point) => {
      svg.append(svgEl("circle", { cx: point.x, cy: point.y, r: points.length === 1 ? 4 : 2.6, fill: series.color }));
    });
  });

  const firstDate = chronological[0]?.trade_date || chronological[0]?.values?.["时间"] || "";
  const lastDate = chronological[chronological.length - 1]?.trade_date || chronological[chronological.length - 1]?.values?.["时间"] || "";
  const startLabel = svgEl("text", { x: pad.left, y: height - 8, class: "axis-label" });
  startLabel.textContent = shortDate(firstDate);
  const endLabel = svgEl("text", { x: width - pad.right, y: height - 8, class: "axis-label axis-label-end" });
  endLabel.textContent = shortDate(lastDate);
  svg.append(startLabel, endLabel);
  container.append(svg);
  return container;
}

function createChartCard(spec, reviews) {
  const card = document.createElement("article");
  card.className = "chart-card";
  const head = document.createElement("div");
  head.className = "chart-head";
  const title = document.createElement("h3");
  title.textContent = spec.title;
  const latest = document.createElement("strong");
  latest.textContent = formatLatestValue(latestValue(reviews, spec.series[0].key), spec.series[0].key);
  head.append(title, latest);
  card.append(head);
  if (spec.showAmountDeltas) card.append(createAmountDeltaStrip(reviews, spec.series[0].key));
  card.append(renderLineChart(spec, reviews));
  if (spec.series.length > 1) card.append(createLegend(spec.series));
  return card;
}

function createLargeChartCard(spec, reviews, options = {}) {
  const card = document.createElement("article");
  card.className = "chart-card chart-card-large";
  const head = document.createElement("div");
  head.className = "chart-head";
  const title = document.createElement("h3");
  title.textContent = options.title || spec.title;
  const latest = document.createElement("strong");
  latest.textContent = spec.series.map((series) => `${series.label} ${formatLatestValue(latestValue(reviews, series.key), series.key)}`).join(" / ");
  head.append(title, latest);
  card.append(
    head,
    renderLineChart(spec, reviews, { width: options.width || 520, height: options.height || 230 }),
    createLegend(spec.series)
  );
  return card;
}

function createLegend(seriesList) {
  const legend = document.createElement("div");
  legend.className = "chart-legend";
  seriesList.forEach((series) => {
    const item = document.createElement("span");
    item.innerHTML = `<i style="background:${series.color}"></i>${series.label}`;
    legend.append(item);
  });
  return legend;
}

function renderCharts(reviews) {
  const marketTarget = el("marketCharts");
  marketTarget.innerHTML = "";
  marketChartSpecs.forEach((spec) => marketTarget.append(createChartCard(spec, reviews)));

  const basisTarget = el("basisChart");
  basisTarget.innerHTML = "";
  basisTarget.append(createLargeChartCard(basisChartSpec, reviews, { title: "三大股指期货加权基差", width: 520, height: 235 }));

  const majorIndexTarget = el("majorIndexChart");
  majorIndexTarget.innerHTML = "";
  majorIndexTarget.append(createLargeChartCard(majorIndexChartSpec, reviews, { width: 520, height: 235 }));

  const componentTarget = el("componentHighCharts");
  componentTarget.innerHTML = "";
  componentHighChartSpecs.forEach((spec) => componentTarget.append(createChartCard(spec, reviews)));

  const topicTarget = el("topicRotationCharts");
  topicTarget.innerHTML = "";
  topicRotationChartSpecs.forEach((spec) => topicTarget.append(createChartCard(spec, reviews)));
}

function renderIndexStrength(reviews) {
  const target = el("indexStrengthStrip");
  target.innerHTML = "";
  reviews.forEach((review) => {
    const values = review.values || {};
    const [strongName, strongValue] = firstPair(values["最强指数"]);
    const [weakName, weakValue] = firstPair(values["最弱指数"]);
    const item = document.createElement("article");
    item.className = "strength-card";
    item.innerHTML = `
      <strong>${shortDate(review.trade_date || values["时间"])}</strong>
      <div><span>最强</span><b>${formatLatestValue(strongName)} ${formatLatestValue(strongValue)}</b></div>
      <div><span>最弱</span><b>${formatLatestValue(weakName)} ${formatLatestValue(weakValue)}</b></div>
    `;
    target.append(item);
  });
}

function renderCell(value) {
  const lines = valueLines(value);
  const wrap = document.createElement("div");
  wrap.className = lines.length > 1 ? "cell-lines" : "";
  lines.forEach((line) => {
    const div = document.createElement("div");
    div.className = line === "空" ? "empty-value" : "";
    div.textContent = line;
    wrap.append(div);
  });
  return wrap;
}

function allKeys(reviews) {
  const known = new Set(sections.flatMap((section) => section.keys));
  const seen = new Set();
  reviews.forEach((review) => {
    Object.keys(review.values || {}).forEach((key) => {
      if (!known.has(key)) seen.add(key);
    });
  });
  return Array.from(seen);
}

function sectionKeysPresent(keys, reviews) {
  return keys.filter((key) => reviews.some((review) => Object.prototype.hasOwnProperty.call(review.values || {}, key)));
}

function createTimeTable(title, keys, reviews) {
  const section = document.createElement("section");
  section.className = "table-section";

  const h2 = document.createElement("h2");
  h2.textContent = title;

  const scroller = document.createElement("div");
  scroller.className = "table-scroll";

  const table = document.createElement("table");
  table.className = "time-table";

  const thead = document.createElement("thead");
  const headerRow = document.createElement("tr");
  const firstHead = document.createElement("th");
  firstHead.className = "field-head";
  firstHead.textContent = "字段";
  headerRow.append(firstHead);
  reviews.forEach((review) => {
    const th = document.createElement("th");
    th.textContent = shortDate(review.trade_date || review.values?.["时间"]);
    headerRow.append(th);
  });
  thead.append(headerRow);
  table.append(thead);

  const tbody = document.createElement("tbody");
  keys.forEach((key) => {
    const row = document.createElement("tr");
    const field = document.createElement("th");
    field.className = "field-name";
    field.textContent = key;
    row.append(field);
    reviews.forEach((review) => {
      const td = document.createElement("td");
      td.append(renderCell((review.values || {})[key]));
      row.append(td);
    });
    tbody.append(row);
  });
  table.append(tbody);
  scroller.append(table);
  section.append(h2, scroller);
  return section;
}

function renderDateStrip(reviews) {
  const strip = el("dateStrip");
  strip.innerHTML = "";
  reviews.forEach((review) => {
    const item = document.createElement("div");
    item.className = "date-pill";
    item.innerHTML = `<strong>${shortDate(review.trade_date || review.values?.["时间"])}</strong><span>${review.status || ""}</span>`;
    strip.append(item);
  });
}

function renderTables(targetId, sectionList, reviews, includeExtras = false) {
  const target = el(targetId);
  target.innerHTML = "";
  sectionList.forEach((section) => {
    const present = sectionKeysPresent(section.keys, reviews);
    if (present.length) target.append(createTimeTable(section.title, present, reviews));
  });
  if (!includeExtras) return;
  const extras = allKeys(reviews);
  if (extras.length) target.append(createTimeTable("其他字段", extras, reviews));
}

function renderSources(latest) {
  const warnings = latest?.warnings || [];
  el("warnings").innerHTML = warnings.length
    ? warnings.map((warning) => `<div>${warning}</div>`).join("")
    : "<div class=\"empty-value\">无警告</div>";

  const sources = latest?.sources || {};
  const sourceTarget = el("sources");
  sourceTarget.innerHTML = "";
  if (!Object.keys(sources).length) {
    sourceTarget.innerHTML = "<div class=\"empty-value\">无数据源说明</div>";
    return;
  }
  const table = document.createElement("table");
  Object.entries(sources).forEach(([key, value]) => {
    const row = document.createElement("tr");
    const th = document.createElement("th");
    const td = document.createElement("td");
    th.textContent = key;
    td.textContent = String(value ?? "");
    row.append(th, td);
    table.append(row);
  });
  sourceTarget.append(table);
}

function render(payload) {
  const reviews = payload.reviews || [];
  const latest = payload.latest || reviews[0];
  el("sampleBadge").hidden = !payload.using_sample;
  if (reviews.length) {
    const newest = shortDate(reviews[0].trade_date || reviews[0].values?.["时间"]);
    const oldest = shortDate(reviews[reviews.length - 1].trade_date || reviews[reviews.length - 1].values?.["时间"]);
    el("rangeText").textContent = `${oldest} 至 ${newest}，共 ${reviews.length} 日`;
  } else {
    el("rangeText").textContent = "无数据";
  }
  renderCharts(reviews);
  renderIndexStrength(reviews);
  renderDateStrip(reviews);
  renderTables("mainlineTables", mainlineSections, reviews);
  renderTables("tables", sections, reviews, true);
  renderSources(latest);
}

async function loadReviews() {
  const payload = window.__AI_DAILY_REVIEW_DATA__;
  if (!payload) throw new Error("缺少静态数据，请重新生成 HTML");
  render(payload);
}

function boot() {
  el("reloadButton").addEventListener("click", () => window.location.reload());
  loadReviews().catch((error) => {
    el("rangeText").textContent = error.message;
  });
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}

</script>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Ai每日复盘 / Sheet1</div>
          <h1>20日时间表</h1>
          <div class="meta-line">
            <span id="rangeText">读取中</span>
            <span id="sampleBadge" class="badge" hidden>示例数据</span>
          </div>
        </div>
        <button id="reloadButton" class="tool-button" type="button" title="刷新当前 HTML 文件">
          <span aria-hidden="true">↻</span>
          <span>刷新页面</span>
        </button>
      </header>

      <main>
        <section class="chart-dashboard">
          <div class="chart-left">
            <div class="section-title-row">
              <h2>市场温度</h2>
              <span>最近 20 日</span>
            </div>
            <div id="marketCharts" class="chart-grid"></div>
          </div>
          <div class="chart-right">
            <div class="right-chart-block">
              <div class="section-title-row">
                <h2>期货基差</h2>
                <span>三大指数</span>
              </div>
              <div id="basisChart" class="basis-chart"></div>
            </div>
            <div class="right-chart-block">
              <div class="section-title-row">
                <h2>三大指数</h2>
                <span>涨跌幅</span>
              </div>
              <div id="majorIndexChart" class="major-index-chart"></div>
            </div>
          </div>
        </section>

        <section class="index-strength-panel">
          <div class="section-title-row">
            <h2>最强 / 最弱指数</h2>
            <span>每日标签</span>
          </div>
          <div id="indexStrengthStrip" class="index-strength-strip"></div>
        </section>

        <section class="secondary-chart-panel">
          <div class="secondary-chart-block">
            <div class="section-title-row">
              <h2>指数成分新高扩散</h2>
              <span>20 日新高占比</span>
            </div>
            <div id="componentHighCharts" class="chart-grid chart-grid-compact"></div>
          </div>
          <div class="secondary-chart-block">
            <div class="section-title-row">
              <h2>题材轮动</h2>
              <span>速度 / 数量</span>
            </div>
            <div id="topicRotationCharts" class="chart-grid chart-grid-compact"></div>
          </div>
        </section>

        <section class="date-strip-panel">
          <div id="dateStrip" class="date-strip"></div>
        </section>

        <section class="tables-block">
          <div class="section-title-row">
            <h2>主线连续观察</h2>
            <span>RPS / 资金流 / 口袋支点</span>
          </div>
          <div id="mainlineTables" class="tables"></div>
        </section>

        <section class="tables-block">
          <div class="section-title-row">
            <h2>完整 20 日字段表</h2>
            <span>Excel 原始字段</span>
          </div>
          <div id="tables" class="tables"></div>
        </section>

        <section class="source-panel">
          <details>
            <summary>最新一日数据源与警告</summary>
            <div id="warnings" class="warnings"></div>
            <div id="sources" class="sources"></div>
          </details>
        </section>
      </main>
    </div>
  </body>
</html>
