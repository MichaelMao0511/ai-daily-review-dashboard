function el(id) {

function isEmpty(value) {
  return value === null || value === undefined || value === "";
}

function shortDate(dateText) {
  if (!dateText) return "--";
  const text = String(dateText);
  const match = text.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (match) return `${match[2]}-${match[3]}`;
  return text.replaceAll(".", "-");
}

function valueLines(value) {
  if (isEmpty(value)) return ["空"];
  if (!Array.isArray(value)) return [String(value)];
  if (!value.length) return ["空"];
  if (value.every((item) => Array.isArray(item))) {
    return value.map((row) => row.map((cell) => isEmpty(cell) ? "空" : String(cell)).join("  "));
  }
  return value.map((item) => isEmpty(item) ? "空" : String(item));
}

  if (isEmpty(value)) return null;
  if (typeof value === "number") return value;
  const match = String(value).replaceAll(",", "").replace("%", "").match(/-?\d+(\.\d+)?/);
  return match ? Number(match[0]) : null;
}

function reviewValue(review, key) {
  return review.values?.[key];
}

function latestValue(reviews, key) {
  for (const review of reviews) {
    const value = reviewValue(review, key);
    if (!isEmpty(value)) return value;
  }
  return "";
}

function formatLatestValue(value, key = "") {
  if (Array.isArray(value)) return valueLines(value).slice(0, 2).join(" / ");
  return isEmpty(value) ? "空" : String(value);
}

function formatRedCountAndRatio(reviews) {
  const review = reviews.find((item) => !isEmpty(reviewValue(item, "红盘")));
  if (!review) return "空";
  const ratio = formatRedRatio(review);
  return ratio ? `${formatLatestValue(review.values?.["红盘"])} · 红盘比例 ${ratio}` : formatLatestValue(review.values?.["红盘"]);
}

function formatRedRatio(review) {
  const values = review.values || {};
  const red = parseNumber(values["红盘"]);
  const green = parseNumber(values["绿盘"]);
  const flat = parseNumber(values["平盘"]);
  const total = red + green + flat;
  if (![red, green, flat].every(Number.isFinite) || total <= 0) return "";
  return `${(red / total * 100).toFixed(1)}%`;
}

function chartPointTitle(review, series) {
  const values = review.values || {};
  const dateText = shortDate(review.trade_date || values["时间"]);
  const valueText = formatChartValue(reviewValue(review, series.key), series);
  return `${dateText} ${series.label} ${valueText}`;
}

function formatChartValue(value, series) {
  const numeric = parseNumber(value);
  if (Number.isFinite(numeric) && Number.isInteger(series?.precision)) {
    return numeric.toFixed(series.precision);
  }
  return formatLatestValue(value, series?.key);
}

function buildChartTooltip(review, seriesList, events = []) {
  const values = review.values || {};
  const dateText = shortDate(review.trade_date || values["时间"]);
  const lines = seriesList.map((series) => {
    const value = formatChartValue(reviewValue(review, series.key), series);
    const ratio = series.key === "红盘" ? formatRedRatio(review) : "";
    return `<div><span style="background:${series.color}"></span><b>${series.label}</b><strong>${value}${ratio ? ` · ${ratio}` : ""}</strong></div>`;
  }).join("");
  const eventText = events.length
    ? `<div class="chart-tooltip-events">${events.map((event) => event.label).join(" / ")}</div>`
    : "";
  return `<p>${dateText}</p>${lines}${eventText}`;
}

function formatAmountDelta(value) {
  if (value === null || !Number.isFinite(value)) return "空";
  const rounded = Math.round(value);
  if (rounded === 0) return "0亿";
  return `${rounded > 0 ? "+" : "-"}${Math.abs(rounded)}亿`;
}

function signedClass(value) {
  if (value > 0) return "positive";
  if (value < 0) return "negative";
  return "neutral";
}

function numericSeries(reviews, key) {
  return reviews
    .map((review) => parseNumber(review.values?.[key]))
    .filter((value) => value !== null && Number.isFinite(value));
}

function createAmountDeltaStrip(reviews, key) {
  const values = numericSeries(reviews, key);
  const latest = values[0];
  const previous = values[1];
  const fiveDayValues = values.slice(0, 5);
  const fiveDayAverage = fiveDayValues.length === 5
    ? fiveDayValues.reduce((sum, value) => sum + value, 0) / fiveDayValues.length
    : null;
  const items = [
    ["较昨日", latest !== undefined && previous !== undefined ? latest - previous : null],
    ["较5日均", latest !== undefined && fiveDayAverage !== null ? latest - fiveDayAverage : null]
  ];
  const strip = document.createElement("div");
  strip.className = "chart-deltas";
  items.forEach(([labelText, value]) => {
    const item = document.createElement("div");
    const label = document.createElement("span");
    const strong = document.createElement("strong");
    label.textContent = labelText;
    strong.textContent = formatAmountDelta(value);
    strong.className = `delta-value ${signedClass(value)}`;
    item.append(label, strong);
    strip.append(item);
  });
  return strip;
}

function firstPair(value) {
  if (Array.isArray(value) && Array.isArray(value[0])) return value[0];
  if (Array.isArray(value)) return value;
  return [value, ""];
}

function svgEl(name, attrs = {}) {
  const node = document.createElementNS("http://www.w3.org/2000/svg", name);
  Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, String(value)));
  return node;
}

function pathFromPoints(points) {
  return points.map((point, index) => `${index === 0 ? "M" : "L"}${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(" ");
}

function eventsForDate(events, review) {
  const date = review.trade_date || review.values?.["时间"];
  return events.filter((event) => event.date === date);
}

function renderChartEvent(svg, event, point, pad) {
  const title = svgEl("title");
  title.textContent = event.label;
  if (event.kind === "confirmed") {
    const marker = svgEl("path", {
      d: `M ${point.x} ${pad.top + 2} L ${point.x + 5} ${pad.top + 7} L ${point.x} ${pad.top + 12} L ${point.x - 5} ${pad.top + 7} Z`,
      class: "chart-event-marker chart-event-confirmed"
    });
    marker.append(title);
    svg.append(marker);
    const label = svgEl("text", { x: point.x, y: pad.top + 25, class: "chart-event-label chart-event-confirmed-label" });
    label.textContent = "确认";
    svg.append(label);
    return;
  }
  const marker = svgEl("circle", { cx: point.x, cy: point.y, r: 5, class: "chart-event-marker chart-event-candidate" });
  marker.append(title);
  svg.append(marker);
  const label = svgEl("text", { x: point.x, y: Math.max(pad.top + 12, point.y - 9), class: "chart-event-label" });
  label.textContent = "候选";
  svg.append(label);
}

function renderLineChart(spec, reviews, options = {}) {
  const chronological = [...reviews].reverse();
  const chartEvents = Array.isArray(spec.events) ? spec.events : [];
  const width = options.width || 360;
  const height = options.height || 170;
  const pad = { left: 32, right: 60, top: 14, bottom: 28 };
  const valuesBySeries = spec.series.map((series) => ({
    ...series,
    values: chronological.map((review) => parseNumber(reviewValue(review, series.key)))
  }));
  const allValues = valuesBySeries.flatMap((series) => series.values.filter((value) => value !== null && Number.isFinite(value)));
  const container = document.createElement("div");
  container.className = "chart-body";
  if (!allValues.length) {
    container.innerHTML = "<div class=\"empty-chart\">无数据</div>";
    return container;
  }

  const includeZero = options.includeZero === true;
  let min = spec.compactScale && !includeZero ? Math.min(...allValues) : Math.min(...allValues, 0);
  let max = spec.compactScale && !includeZero ? Math.max(...allValues) : Math.max(...allValues, 0);
  if (min === max) {
    min -= 1;
    max += 1;
  }
  const yPad = (max - min) * 0.08;
  min -= yPad;
  max += yPad;
  const xStep = chronological.length > 1 ? (width - pad.left - pad.right) / (chronological.length - 1) : 0;
  const yScale = (value) => pad.top + (max - value) / (max - min) * (height - pad.top - pad.bottom);
  const xScale = (index) => pad.left + index * xStep;

  const svg = svgEl("svg", { viewBox: `0 0 ${width} ${height}`, role: "img", "aria-label": spec.title });
  const tooltip = document.createElement("div");
  tooltip.className = "chart-tooltip";
  tooltip.hidden = true;
  const showTooltip = (index, event) => {
    const bounds = container.getBoundingClientRect();
    const left = Math.max(8, Math.min(bounds.width - 8, event.clientX - bounds.left));
    tooltip.innerHTML = buildChartTooltip(chronological[index], spec.series, eventsForDate(chartEvents, chronological[index]));
    tooltip.style.left = `${left}px`;
    tooltip.style.top = "8px";
    tooltip.hidden = false;
  };
  const hideTooltip = () => {
    tooltip.hidden = true;
  };
  [0.25, 0.5, 0.75].forEach((ratio) => {
    const y = pad.top + ratio * (height - pad.top - pad.bottom);
    svg.append(svgEl("line", { x1: pad.left, y1: y, x2: width - pad.right, y2: y, class: "grid-line" }));
  });
  if (min < 0 && max > 0) {
    const zeroY = yScale(0);
    svg.append(svgEl("line", { x1: pad.left, y1: zeroY, x2: width - pad.right, y2: zeroY, class: "zero-line" }));
    if (includeZero) {
      const zeroLabel = svgEl("text", { x: width - pad.right, y: zeroY - 5, class: "zero-axis-label" });
      zeroLabel.textContent = "0轴";
      svg.append(zeroLabel);
    }
  }

  valuesBySeries.forEach((series) => {
    const points = series.values
      .map((value, index) => value === null || !Number.isFinite(value) ? null : { x: xScale(index), y: yScale(value), index })
      .filter(Boolean);
    if (!points.length) return;
    if (points.length >= 2) {
      svg.append(svgEl("path", {
        d: pathFromPoints(points),
        fill: "none",
        stroke: series.color,
        "stroke-width": 2.4,
        "stroke-linecap": "round",
        "stroke-linejoin": "round"
      }));
    }
    points.forEach((point) => {
      const circle = svgEl("circle", { cx: point.x, cy: point.y, r: points.length === 1 ? 4 : 2.6, fill: series.color });
      const title = svgEl("title");
      title.textContent = chartPointTitle(chronological[point.index], series);
      circle.append(title);
      svg.append(circle);
    });
  });

  chartEvents.forEach((event) => {
    const index = chronological.findIndex((review) => (review.trade_date || review.values?.["时间"]) === event.date);
    const series = valuesBySeries.find((item) => item.key === (event.seriesKey || "长期DIFF"));
    const value = series?.values[index];
    if (index < 0 || !Number.isFinite(value)) return;
    renderChartEvent(svg, event, { x: xScale(index), y: yScale(value) }, pad);
  });

  const firstDate = chronological[0]?.trade_date || chronological[0]?.values?.["时间"] || "";
  const lastDate = chronological[chronological.length - 1]?.trade_date || chronological[chronological.length - 1]?.values?.["时间"] || "";
  const startLabel = svgEl("text", { x: pad.left, y: height - 8, class: "axis-label" });
  startLabel.textContent = shortDate(firstDate);
  const endLabel = svgEl("text", { x: width - pad.right, y: height - 8, class: "axis-label axis-label-end" });
  endLabel.textContent = shortDate(lastDate);
  svg.append(startLabel, endLabel);

  chartEvents.forEach((event) => {
    const index = chronological.findIndex((review) => (review.trade_date || review.values?.["时间"]) === event.date);
    if (index <= 0 || index >= chronological.length - 1) return;
    const label = svgEl("text", { x: xScale(index), y: height - 8, class: "axis-label event-axis-label" });
    label.textContent = shortDate(event.date);
    svg.append(label);
  });

  chronological.forEach((review, index) => {
    const left = index === 0 ? pad.left : xScale(index) - xStep / 2;
    const right = index === chronological.length - 1 ? width - pad.right : xScale(index) + xStep / 2;
    const hitArea = svgEl("rect", {
      x: left,
      y: pad.top,
      width: Math.max(8, right - left),
      height: height - pad.top - pad.bottom,
      class: "chart-hit-area",
      tabindex: 0,
      "aria-label": chartPointTitle(review, spec.series[0])
    });
    hitArea.addEventListener("mousemove", (event) => showTooltip(index, event));
    hitArea.addEventListener("mouseenter", (event) => showTooltip(index, event));
    hitArea.addEventListener("mouseleave", hideTooltip);
    hitArea.addEventListener("focus", () => {
      tooltip.innerHTML = buildChartTooltip(review, spec.series, eventsForDate(chartEvents, review));
      tooltip.style.left = `${Math.min(container.clientWidth - 8, Math.max(8, xScale(index) / width * container.clientWidth))}px`;
      tooltip.style.top = "14px";
      tooltip.hidden = false;
    });
    hitArea.addEventListener("blur", hideTooltip);
    svg.append(hitArea);
  });

  container.append(svg, tooltip);
  return container;
}

function createChartCard(spec, reviews) {
  const card = document.createElement("article");
  card.className = "chart-card";
  const head = document.createElement("div");
  head.className = "chart-head";
  const title = document.createElement("h3");
  title.textContent = spec.title;
  const latest = document.createElement("strong");
  latest.textContent = spec.formatLatest
    ? spec.formatLatest(reviews)
    : formatLatestValue(latestValue(reviews, spec.series[0].key), spec.series[0].key);
  head.append(title, latest);
  card.append(head);
  if (spec.showAmountDeltas) card.append(createAmountDeltaStrip(reviews, spec.series[0].key));
  card.append(renderLineChart(spec, reviews));
  if (spec.series.length > 1) card.append(createLegend(spec.series));
  return card;
}

function createLargeChartCard(spec, reviews, options = {}) {
  const card = document.createElement("article");
  card.className = "chart-card chart-card-large";
  const head = document.createElement("div");
  head.className = "chart-head";
  const title = document.createElement("h3");
  title.textContent = options.title || spec.title;
  const latest = document.createElement("strong");
  latest.textContent = spec.series.map((series) => `${series.label} ${formatLatestValue(latestValue(reviews, series.key), series.key)}`).join(" / ");
  head.append(title, latest);
  card.append(
    head,
    renderLineChart(spec, reviews, { width: options.width || 520, height: options.height || 230 }),
    createLegend(spec.series)
  );
  return card;
}

function createLegend(seriesList) {
  const legend = document.createElement("div");
  legend.className = "chart-legend";
  seriesList.forEach((series) => {
    const item = document.createElement("span");
    item.innerHTML = `<i style="background:${series.color}"></i>${series.label}`;
    legend.append(item);
  });
  return legend;
}

function renderCharts(reviews) {

  const basisTarget = el("basisChart");

}

function renderIndexStrength(reviews) {
  const target = el("indexStrengthStrip");
  target.innerHTML = "";
  reviews.forEach((review) => {
    const values = review.values || {};
    const [strongName, strongValue] = firstPair(values["最强指数"]);
    const [weakName, weakValue] = firstPair(values["最弱指数"]);
    const item = document.createElement("article");
    item.className = "strength-card";
    item.innerHTML = `
      <strong>${shortDate(review.trade_date || values["时间"])}</strong>
      <div><span>最强</span><b>${formatLatestValue(strongName)} ${formatLatestValue(strongValue)}</b></div>
      <div><span>最弱</span><b>${formatLatestValue(weakName)} ${formatLatestValue(weakValue)}</b></div>
    `;
    target.append(item);
  });
}

function timingStateClass(state) {
  return state === "多" ? "timing-long" : state === "空" ? "timing-short" : "timing-flat";
}

const TIMING_HISTORY_DAYS = 40;
const LONG_DIVERGENCE_WINDOW = 55;

function timingRowsForCode(rows, code, selectedDate) {
  return rows
    .filter((row) => row["指数代码"] === code && row["日期"] <= selectedDate)
    .slice()
    .sort((left, right) => left["日期"].localeCompare(right["日期"]));
}

function resolvedTimingState(rows, index, period) {
  for (let cursor = index; cursor >= 0; cursor -= 1) {
    const state = rows[cursor][`${period}状态`];
    if (state === "多" || state === "空") return state;
  }
  return "";
}

function buildLongBottomEvents(rows) {
  const events = [];
  let active = null;
  rows.forEach((row, index) => {
    const close = parseNumber(row["收盘价"]);
    if (!Number.isFinite(close)) return;
    if (active && close < active.secondLow) {
      active.invalidatedDate = row["日期"];
      active = null;
    }
    if (active && !active.confirmedDate && active.reactionHigh !== null && close > active.reactionHigh) {
      active.confirmedDate = row["日期"];
    }
    if (row["长期背离"] !== "疑似底背离") return;

    const start = Math.max(0, index - (LONG_DIVERGENCE_WINDOW - 1));
    let firstLowIndex = -1;
    let firstLow = Infinity;
    for (let cursor = index - 1; cursor >= start; cursor -= 1) {
      const priorClose = parseNumber(rows[cursor]["收盘价"]);
      if (Number.isFinite(priorClose) && priorClose < firstLow) {
        firstLow = priorClose;
        firstLowIndex = cursor;
      }
    }
    const reboundCloses = rows
      .slice(firstLowIndex + 1, index)
      .map((item) => parseNumber(item["收盘价"]))
      .filter(Number.isFinite);
    const event = {
      candidateDate: row["日期"],
      firstLowDate: firstLowIndex >= 0 ? rows[firstLowIndex]["日期"] : "",
      secondLow: close,
      reactionHigh: reboundCloses.length ? Math.max(...reboundCloses) : null,
      confirmedDate: "",
      invalidatedDate: ""
    };
    events.push(event);
    active = event;
  });
  return events;
}

function timingTrend(rows) {
  if (!rows.length) return { label: "趋势待定", className: "trend-pending", events: [] };
  const index = rows.length - 1;
  const longState = resolvedTimingState(rows, index, "长期");
  const midState = resolvedTimingState(rows, index, "中期");
  const events = buildLongBottomEvents(rows);
  if (!longState || !midState) return { label: "趋势待定", className: "trend-pending", events };
  if (longState === "多" && midState === "多") return { label: "上升趋势", className: "trend-rising", events };
  if (longState === "多") return { label: "升势受阻", className: "trend-blocked", events };
  const confirmed = [...events].reverse().find((event) => event.confirmedDate && !event.invalidatedDate);
  return confirmed
    ? { label: "尝试反弹", className: "trend-rebound", events }
    : { label: "下降趋势", className: "trend-falling", events };
}

function chartEventsFromLongBottom(events) {
  return events.flatMap((event) => {
    const markers = [{ date: event.candidateDate, kind: "candidate", label: "底背离候选", seriesKey: "长期DIFF" }];
    if (event.confirmedDate) {
      markers.push({ date: event.confirmedDate, kind: "confirmed", label: "确认→尝试反弹", seriesKey: "长期DIFF" });
    }
    return markers;
  });
}

function renderTimingHistory(rows, code, selectedDate) {
  const target = el("marketTimingHistory");
  const history = timingRowsForCode(rows, code, selectedDate);
  const selected = history.slice(-TIMING_HISTORY_DAYS);
  const name = selected[0]?.["指数名称"] || code;
  const trend = timingTrend(history);
  const chartEvents = chartEventsFromLongBottom(trend.events)
    .filter((event) => selected.some((row) => row["日期"] === event.date));
  const reviews = selected.map((row) => ({
    trade_date: row["日期"],
    values: {
      "长期DIFF": row["长期DIFF"],
      "中期DIFF": row["中期DIFF"],
      "短期DIFF": row["短期DIFF"]
    }
  })).reverse();
  const divergences = selected
    .flatMap((row) => ["长期", "中期", "短期"].map((period) => (
      period === "长期" && row[`${period}背离`] === "疑似底背离"
        ? ""
        : row[`${period}背离`] ? `${shortDate(row["日期"])} ${period}${row[`${period}背离`]}` : ""
    )))
    .filter(Boolean);
  const eventNotes = chartEvents.map((event) => `${shortDate(event.date)} ${event.label}`);
  const notes = [...divergences, ...eventNotes];
  target.innerHTML = "";
  const heading = document.createElement("div");
  heading.className = "timing-history-head";
  heading.innerHTML = `<strong>${name} · 近${TIMING_HISTORY_DAYS}日 DIFF</strong><span>${notes.length ? notes.join(" / ") : `近${TIMING_HISTORY_DAYS}日无疑似背离`}</span>`;
  target.append(heading, renderLineChart({
    title: `${name} 三周期 DIFF`,
    series: [
      { key: "长期DIFF", label: "长期", color: "#315f8c", precision: 2 },
      { key: "中期DIFF", label: "中期", color: "#a66a18", precision: 2 },
      { key: "短期DIFF", label: "短期", color: "#b34034", precision: 2 }
    ],
    events: chartEvents
  }, reviews, { width: 760, height: 220, includeZero: true }));
  target.hidden = false;
}

function renderMarketTiming(payload) {
  const panel = el("marketTimingPanel");
  const timing = payload.market_timing;
  const rows = timing?.rows || [];
  if (!rows.length || !timing?.target_date) {
    panel.hidden = true;
    return;
  }
  const dates = [...new Set(rows.map((row) => row["日期"]))].sort().reverse();
  const select = el("marketTimingSelect");
  select.innerHTML = "";
  dates.forEach((date) => {
    const option = document.createElement("option");
    option.value = date;
    option.textContent = shortDate(date);
    option.selected = date === timing.target_date;
    select.append(option);
  });
  const renderForDate = (selectedDate) => {
    const latestRows = rows.filter((row) => row["日期"] === selectedDate);
    if (!latestRows.length) return;
    el("marketTimingDate").textContent = `${shortDate(selectedDate)} · Tushare 日线 · DIFF / 0轴`;
    const target = el("marketTimingMatrix");
    target.innerHTML = "";
    const header = document.createElement("div");
    header.className = "timing-row timing-header";
    header.innerHTML = "<span>指数</span><span>长期 21/34</span><span>中期 5/13</span><span>短期 1/5</span>";
    target.append(header);
    latestRows.forEach((row) => {
      const indexRows = timingRowsForCode(rows, row["指数代码"], selectedDate);
      const trend = timingTrend(indexRows);
      const item = document.createElement("button");
      item.type = "button";
      item.className = "timing-row timing-data-row";
      const cells = ["长期", "中期", "短期"].map((period) => {
        const state = row[`${period}状态`] || "平";
        const diff = Number(row[`${period}DIFF`]);
        const divergence = row[`${period}背离`];
        return `<span class="timing-signal ${timingStateClass(state)}"><b>${state}</b><em>${Number.isFinite(diff) ? diff.toFixed(2) : "--"}</em>${divergence ? `<i>${divergence.replace("疑似", "")}</i>` : ""}</span>`;
      });
      item.innerHTML = `<strong>${row["指数名称"]}<span class="trend-badge ${trend.className}">${trend.label}</span></strong>${cells.join("")}`;
      item.addEventListener("click", () => renderTimingHistory(rows, row["指数代码"], selectedDate));
      target.append(item);
    });
    renderTimingHistory(rows, latestRows[0]["指数代码"], selectedDate);
  };
  if (!dates.length) {
    panel.hidden = true;
    return;
  }
  panel.hidden = false;
  select.addEventListener("change", () => renderForDate(select.value));
  renderForDate(timing.target_date);
}

function renderCell(value) {
  const lines = valueLines(value);
  const wrap = document.createElement("div");
  wrap.className = lines.length > 1 ? "cell-lines" : "";
  lines.forEach((line) => {
    const div = document.createElement("div");
    div.className = line === "空" ? "empty-value" : "";
    div.textContent = line;
    wrap.append(div);
  });
  return wrap;
}

function allKeys(reviews) {
  const known = new Set(sections.flatMap((section) => section.keys));
  const seen = new Set();
  reviews.forEach((review) => {
    Object.keys(review.values || {}).forEach((key) => {
      if (!known.has(key)) seen.add(key);
    });
  });
  return Array.from(seen);
}

function sectionKeysPresent(keys, reviews) {
  return keys.filter((key) => reviews.some((review) => Object.prototype.hasOwnProperty.call(review.values || {}, key)));
}

function createTimeTable(title, keys, reviews) {
  const section = document.createElement("section");
  section.className = "table-section";

  const h2 = document.createElement("h2");
  h2.textContent = title;

  const scroller = document.createElement("div");
  scroller.className = "table-scroll";

  const table = document.createElement("table");
  table.className = "time-table";

  const thead = document.createElement("thead");
  const headerRow = document.createElement("tr");
  const firstHead = document.createElement("th");
  firstHead.className = "field-head";
  firstHead.textContent = "字段";
  headerRow.append(firstHead);
  reviews.forEach((review) => {
    const th = document.createElement("th");
    th.textContent = shortDate(review.trade_date || review.values?.["时间"]);
    headerRow.append(th);
  });
  thead.append(headerRow);
  table.append(thead);

  const tbody = document.createElement("tbody");
  keys.forEach((key) => {
    const row = document.createElement("tr");
    const field = document.createElement("th");
    field.className = "field-name";
    field.textContent = key;
    row.append(field);
    reviews.forEach((review) => {
      const td = document.createElement("td");
      td.append(renderCell((review.values || {})[key]));
      row.append(td);
    });
    tbody.append(row);
  });
  table.append(tbody);
  scroller.append(table);
  section.append(h2, scroller);
  return section;
}

function renderDateStrip(reviews) {
  const strip = el("dateStrip");
  strip.innerHTML = "";
  reviews.forEach((review) => {
    const item = document.createElement("div");
    item.className = "date-pill";
    item.innerHTML = `<strong>${shortDate(review.trade_date || review.values?.["时间"])}</strong><span>${review.status || ""}</span>`;
    strip.append(item);
  });
}

function renderTables(targetId, sectionList, reviews, includeExtras = false) {
  const target = el(targetId);
  target.innerHTML = "";
  sectionList.forEach((section) => {
    const present = sectionKeysPresent(section.keys, reviews);
    if (present.length) target.append(createTimeTable(section.title, present, reviews));
  });
  if (!includeExtras) return;
  const extras = allKeys(reviews);
  if (extras.length) target.append(createTimeTable("其他字段", extras, reviews));
}

function renderSources(latest) {
  const warnings = latest?.warnings || [];
  el("warnings").innerHTML = warnings.length
    ? warnings.map((warning) => `<div>${warning}</div>`).join("")
    : "<div class=\"empty-value\">无警告</div>";

  const sources = latest?.sources || {};
  const sourceTarget = el("sources");
  sourceTarget.innerHTML = "";
  if (!Object.keys(sources).length) {
    sourceTarget.innerHTML = "<div class=\"empty-value\">无数据源说明</div>";
    return;
  }
  const table = document.createElement("table");
  Object.entries(sources).forEach(([key, value]) => {
    const row = document.createElement("tr");
    const th = document.createElement("th");
    const td = document.createElement("td");
    th.textContent = key;
    td.textContent = String(value ?? "");
    row.append(th, td);
    table.append(row);
  });
  sourceTarget.append(table);
}

function render(payload) {
  const reviews = payload.reviews || [];
  const latest = payload.latest || reviews[0];
  el("sampleBadge").hidden = !payload.using_sample;
  if (reviews.length) {
    const newest = shortDate(reviews[0].trade_date || reviews[0].values?.["时间"]);
    const oldest = shortDate(reviews[reviews.length - 1].trade_date || reviews[reviews.length - 1].values?.["时间"]);
    el("rangeText").textContent = `${oldest} 至 ${newest}，共 ${reviews.length} 日`;
  } else {
    el("rangeText").textContent = "无数据";
  }
  renderCharts(reviews);
  renderMarketTiming(payload);
  renderIndexStrength(reviews);
  renderDateStrip(reviews);
  renderTables("mainlineTables", mainlineSections, reviews);
  renderTables("tables", sections, reviews, true);
  renderSources(latest);
}

async function loadReviews() {
  const payload = window.__AI_DAILY_REVIEW_DATA__;
  if (!payload) throw new Error("缺少静态数据，请重新生成 HTML");
  render(payload);
}

function boot() {
  el("reloadButton").addEventListener("click", () => window.location.reload());
  loadReviews().catch((error) => {
    el("rangeText").textContent = error.message;
  });
}

if (globalThis.__AI_DAILY_REVIEW_TEST__) {
  globalThis.__AI_DAILY_REVIEW_TEST_API__ = {
    buildLongBottomEvents,
    timingTrend,
    resolvedTimingState
  };
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}

</script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Ai每日复盘 / Sheet1</div>
          <h1>20日时间表</h1>
          <div class="meta-line">
            <span id="rangeText">读取中</span>
            <span id="sampleBadge" class="badge" hidden>示例数据</span>
          </div>
        </div>
        <button id="reloadButton" class="tool-button" type="button" title="刷新当前 HTML 文件">
          <span aria-hidden="true">↻</span>
          <span>刷新页面</span>
        </button>
      </header>

      <main>
        <section class="chart-dashboard">
          <div class="chart-left">
            <div class="section-title-row">
              <h2>市场温度</h2>
              <span>最近 20 日</span>
            </div>
            <div id="marketCharts" class="chart-grid"></div>
          </div>
          <div class="chart-right">
            <div class="right-chart-block">
              <div class="section-title-row">
                <h2>期货基差</h2>
                <span>三大指数</span>
              </div>
              <div id="basisChart" class="basis-chart"></div>
            </div>
            <div class="right-chart-block">
              <div class="section-title-row">
                <h2>三大指数</h2>
                <span>涨跌幅</span>
              </div>
              <div id="majorIndexChart" class="major-index-chart"></div>
            </div>
          </div>
        </section>

        <section id="marketTimingPanel" class="market-timing-panel" hidden>
          <div class="section-title-row">
            <h2>市场时机模型</h2>
            <label class="timing-date-control">日期
              <select id="marketTimingSelect" aria-label="选择市场时机模型日期"></select>
            </label>
            <span id="marketTimingDate">DIFF / 0轴</span>
          </div>
          <div id="marketTimingMatrix" class="market-timing-matrix"></div>
          <div id="marketTimingHistory" class="market-timing-history" hidden></div>
        </section>

        <section class="index-strength-panel">
          <div class="section-title-row">
            <h2>最强 / 最弱指数</h2>
            <span>每日标签</span>
          </div>
          <div id="indexStrengthStrip" class="index-strength-strip"></div>
        </section>

        <section class="secondary-chart-panel">
          <div class="secondary-chart-block">
            <div class="section-title-row">
              <h2>指数成分新高扩散</h2>
              <span>20 日新高占比</span>
            </div>
            <div id="componentHighCharts" class="chart-grid chart-grid-compact"></div>
          </div>
          <div class="secondary-chart-block">
            <div class="section-title-row">
              <h2>题材轮动</h2>
              <span>速度 / 数量</span>
            </div>
            <div id="topicRotationCharts" class="chart-grid chart-grid-compact"></div>
          </div>
        </section>

        <section class="date-strip-panel">
          <div id="dateStrip" class="date-strip"></div>
        </section>

        <section class="tables-block">
          <div class="section-title-row">
            <h2>主线连续观察</h2>
            <span>RPS / 资金流 / 口袋支点</span>
          </div>
          <div id="mainlineTables" class="tables"></div>
        </section>

        <section class="tables-block">
          <div class="section-title-row">
            <h2>完整 20 日字段表</h2>
            <span>Excel 原始字段</span>
          </div>
          <div id="tables" class="tables"></div>
        </section>

        <section class="source-panel">
          <details>
            <summary>最新一日数据源与警告</summary>
            <div id="warnings" class="warnings"></div>
            <div id="sources" class="sources"></div>
          </details>
        </section>
      </main>
    </div>
  </body>
</html>
